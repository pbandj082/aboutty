name: Update README SVG

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - closed
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  update:
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
      - uses: pnpm/action-setup@v6
        with:
          version: 10.15.1
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm update:readme-svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: pbandj082/aboutty/packages/action@main
        with:
          config: aboutty.json
          output: assets/aboutty.svg
      - name: Commit README SVG
        run: |
          if git diff --quiet -- aboutty.json assets/aboutty.svg; then
            echo "No README SVG changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add aboutty.json assets/aboutty.svg
          git commit -m "chore: update readme aboutty svg [skip ci]"
          git push origin HEAD:main
